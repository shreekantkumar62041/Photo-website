<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glass Booking App</title>

<link rel="stylesheet" href="style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="app.js" defer></script>
</head>

<body>

<div class="bg"></div>

<div class="card glass">

<h2>📸 Booking</h2>

<div class="grid">

<label class="box glass">
<input type="checkbox" data-price="5000" value="Wedding">
<div class="content">💍 Wedding<br>&#8377;5000</div>
</label>

<label class="box glass">
<input type="checkbox" data-price="2000" value="Birthday">
<div class="content">🎂 Birthday<br>&#8377;2000</div>
</label>

<label class="box glass">
<input type="checkbox" data-price="3000" value="Party">
<div class="content">🎉 Party<br>&#8377;3000</div>
</label>

<label class="box glass">
<input type="checkbox" data-price="6000" value="Pre-Wedding">
<div class="content">📸 Pre-Wedding<br>&#8377;6000</div>
</label>

</div>

<input id="name" placeholder="Your Name">
<input id="date" type="date">

<h3 id="total">Total: &#8377;0</h3>

<button onclick="pay()">Book & Pay</button>
<a href="dashboard.html"><button>📊 Dashboard</button></a>

</div>

</body>
</html>
