<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo Booking</title>

<link rel="stylesheet" href="style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="app.js" defer></script>
</head>

<body>

<div class="bg"></div>

<div class="header glass">
  <h2>📸 Photo Booking</h2>
  <p>Professional Service</p>
</div>

<div class="card glass">

<h3>Select Event</h3>

<div class="grid">

<label class="box">
<input type="checkbox" data-price="5000" value="Wedding">
<div class="content">💍<br>Wedding<br>&#8377;5000</div>
</label>

<label class="box">
<input type="checkbox" data-price="2000" value="Birthday">
<div class="content">🎂<br>Birthday<br>&#8377;2000</div>
</label>

<label class="box">
<input type="checkbox" data-price="3000" value="Party">
<div class="content">🎉<br>Party<br>&#8377;3000</div>
</label>

<label class="box">
<input type="checkbox" data-price="6000" value="Pre-Wedding">
<div class="content">📸<br>Pre-Wedding<br>&#8377;6000</div>
</label>

</div>

<input id="name" placeholder="Full Name">
<input id="date" type="date">

<h2 id="total">Total: &#8377;0</h2>

<button class="primary" onclick="pay()">Book & Pay</button>
<a href="dashboard.html"><button class="secondary">Dashboard</button></a>

</div>

</body>
</html>
