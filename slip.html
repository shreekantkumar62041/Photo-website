<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Receipt</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
 font-family:'Segoe UI',sans-serif;
 background:#f4f6f9;
 margin:0;
}

.container{
 max-width:400px;
 margin:20px auto;
 background:white;
 padding:20px;
 border-radius:12px;
 box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.header{
 text-align:center;
 border-bottom:1px solid #ddd;
 padding-bottom:10px;
}

.header img{
 width:80px;
}

.title{
 font-weight:bold;
 font-size:18px;
 margin-top:5px;
}

.table{
 width:100%;
 margin-top:15px;
 border-collapse:collapse;
}

.table td{
 padding:8px;
 border-bottom:1px solid #eee;
}

.total{
 font-weight:bold;
 font-size:16px;
}

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 background:#28a745;
 color:white;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="container" id="slip">

<div class="header">
<img src="logo.png">
<div class="title">Photo Booking Service</div>
</div>

<table class="table" id="data"></table>

</div>

<button onclick="downloadPDF()">📄 Download PDF</button>
<button onclick="sendWhatsApp()">📲 WhatsApp</button>

<script>
let b = JSON.parse(localStorage.getItem("booking") || "{}");

// SAFE EVENTS
let events = (b.events || []).join(", ");

// DISPLAY TABLE
document.getElementById("data").innerHTML = `
<tr><td>Name</td><td>${b.name}</td></tr>
<tr><td>Date</td><td>${b.date}</td></tr>
<tr><td>Events</td><td>${events}</td></tr>
<tr><td>Payment ID</td><td>${b.payment_id}</td></tr>
<tr><td>Time</td><td>${b.time}</td></tr>
<tr class="total"><td>Total</td><td>₹${b.total}</td></tr>
`;

// 📄 PDF (PRO STYLE)
function downloadPDF(){
 const { jsPDF } = window.jspdf;
 let doc = new jsPDF();

 doc.setFontSize(18);
 doc.text("Payment Receipt", 60, 20);

 doc.setFontSize(12);

 doc.text("Name: " + b.name, 20, 40);
 doc.text("Date: " + b.date, 20, 50);
 doc.text("Events: " + events, 20, 60);
 doc.text("Payment ID: " + b.payment_id, 20, 70);
 doc.text("Total: Rs " + b.total, 20, 80);

 doc.setDrawColor(0);
 doc.rect(10, 30, 190, 60);

 doc.save("receipt.pdf");
}

// 📲 WhatsApp
function sendWhatsApp(){
 let msg = `📸 Photo Booking Receipt

Name: ${b.name}
Date: ${b.date}
Events: ${events}
Total: Rs ${b.total}
Payment ID: ${b.payment_id}`;

 window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
