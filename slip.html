<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body style="background:#111;color:white;text-align:center;">

<h2>🧾 Receipt</h2>
<p id="data"></p>

<button onclick="pdf()">PDF</button>
<button onclick="wa()">WhatsApp</button>

<script>
let b=JSON.parse(localStorage.getItem("booking"));
let events=b.events.join(", ");

data.innerHTML=`
${b.name}<br>
${events}<br>
₹${b.total}<br>
${b.payment_id}
`;

function pdf(){
 let {jsPDF}=window.jspdf;
 let doc=new jsPDF();

 let img=new Image();
 img.src="logo.png";

 img.onload=function(){
  doc.addImage(img,"PNG",80,10,40,20);
  doc.text("Receipt",80,40);
  doc.text("Name:"+b.name,20,60);
  doc.text("Events:"+events,20,70);
  doc.text("₹"+b.total,20,80);
  doc.save("receipt.pdf");
 };
}

function wa(){
 let msg=`Booking Confirmed
${b.name}
${events}
₹${b.total}`;
 window.open("https://wa.me/?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
